<!DOCTYPE html>
<html>
  <head>
    <script>
      (function() {
        var path = window.location.pathname;
        // Si l'utilisateur tape /optique, on le renvoie vers /apps/optique
        if (path === "/optique" || path === "/optique/") {
          window.location.replace("/applets/optique/");
        } else if (path === "/mendeleiev" || path === "/mendeleiev/") {
          window.location.replace("/applets/tableau/");
        }
      })();
    </script>
  </head>
  <body>
    <h1>Page introuvable</h1>
    <p>La page demandée n'existe pas.</p>
  </body>
</html>
