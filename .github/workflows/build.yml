name: Build PhyWeb

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write
      packages: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Disable Windows Defender for workspace (Speed up build)
      if: matrix.os == 'windows-latest'
      run: Add-MpPreference -ExclusionPath ${{ github.workspace }}
      shell: powershell

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Flatpak (Linux only)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y flatpak flatpak-builder
        sudo flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo

        # On installe la version 22.08 qui contient clang++ nativement
        sudo flatpak install -y flathub \
          org.freedesktop.Platform//22.08 \
          org.freedesktop.Sdk//22.08 \
          org.electronjs.Electron2.BaseApp//22.08

        flatpak remotes

    - name: Setup AppX requirements (Windows only)
      if: matrix.os == 'windows-latest'
      run: |
        # 1. On génère un certificat de test silencieusement
        $cert = New-SelfSignedCertificate -Type Custom -Subject "CN=2A272021-41C4-4363-BC75-191E2B3B681C" -KeyUsage DigitalSignature -FriendlyName "PhyWeb CI" -CertStoreLocation "Cert:\CurrentUser\My" -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3", "2.5.29.19={text}")
        $pwd = ConvertTo-SecureString -String "password123" -Force -AsPlainText
        Export-PfxCertificate -Cert $cert -FilePath "devCert.pfx" -Password $pwd
        
        # 2. On trouve le chemin du SDK Windows dynamiquement
        $kitPath = (Resolve-Path "C:\Program Files (x86)\Windows Kits\10\bin\10.0.*\x64" | Select-Object -Last 1).Path
        echo "WINDOWS_KITS_PATH=$kitPath" >> $env:GITHUB_ENV
      shell: powershell

    - name: Build app
      run: npm run make
      env:
        DEBUG: '*'
        CI: true

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PhyWeb-Builds-${{ matrix.os }}
        path: out/make/**/*

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          out/make/phyweb.exe
          out/make/**/*.flatpak
          out/make/**/*.appx
        fail_on_unmatched_files: false # Empêche de planter si le flatpak est absent sur Windows
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}