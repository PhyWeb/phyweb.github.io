name: Build PhyWeb

on:
  push:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Flatpak (Linux only)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y flatpak flatpak-builder
        sudo flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo

        # On installe la version 22.08 qui contient clang++ nativement
        sudo flatpak install -y flathub \
          org.freedesktop.Platform//22.08 \
          org.freedesktop.Sdk//22.08 \
          org.electronjs.Electron2.BaseApp//22.08

        flatpak remotes

    - name: Verify llvm16 inside Flatpak SDK
      if: matrix.os == 'ubuntu-latest'
      run: |
        # Vérifie que l'extension est bien montable par flatpak-builder
        flatpak run --command=bash \
          --filesystem=host \
          --env=PATH=/usr/lib/sdk/llvm16/bin:/usr/bin:/bin \
          org.freedesktop.Sdk//22.08 \
          -c "which clang++ && clang++ --version" || echo "clang++ introuvable dans le SDK"

    - name: Build app
      run: npm run make
      env:
        DEBUG: '*'
        CI: true

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PhyWeb-Builds-${{ matrix.os }}
        path: out/make/**/*